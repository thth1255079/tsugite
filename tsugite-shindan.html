<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>つぎて 適性診断 — 自分の感覚でつながる仕事</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f5f0;
            color: #333;
            line-height: 1.7;
        }
        
        header {
            background: linear-gradient(135deg, #a8c4a0, #d4c9b0);
            color: #fff;
            text-align: center;
            padding: 70px 20px 50px;
        }
        
        h1 {
            font-size: 2.6rem;
            margin: 0 0 10px;
        }
        
        .subtitle {
            font-size: 1.25rem;
            opacity: 0.95;
        }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .question {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }
        
        .question h3 {
            color: #4a6b4a;
            margin-top: 0;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        
        .option {
            padding: 16px 20px;
            background: #f8f5f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .option:hover {
            background: #e8f0e0;
            border-color: #8ab07d;
        }
        
        .option.selected {
            background: #d4e4c8;
            border-color: #6f8f63;
            font-weight: 500;
        }
        
        button {
            background: #8ab07d;
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 1.15rem;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 40px auto 0;
        }
        
        button:hover {
            background: #6f8f63;
        }
        
        .result {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            margin-top: 50px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>つぎて 適性診断</h1>
        <p class="subtitle">自分の心地よさや感覚をヒントに、<br>自然とつながる仕事を見つけてみましょう</p>
    </header>

    <div class="container">
        <!-- ここに質問を5〜6個程度入れています。必要に応じて調整してください -->
        <div class="question" id="q1">
            <h3>1. あなたが一番落ち着く場所や時間は？</h3>
            <div class="options">
                <div class="option" data-value="nature">広い畑や森の中で、風を感じながら過ごす時間</div>
                <div class="option" data-value="hand">手を使って何かを作っているとき</div>
                <div class="option" data-value="quiet">静かな作業場で、集中して取り組むとき</div>
                <div class="option" data-value="people">誰かと一緒に、のんびり話しながら作業するとき</div>
            </div>
        </div>

        <div class="question" id="q2">
            <h3>2. 子ども時代に楽しかったことは？</h3>
            <div class="options">
                <div class="option" data-value="outdoor">外で土や植物に触れること</div>
                <div class="option" data-value="craft">工作や道具をいじること</div>
                <div class="option" data-value="helping">家族や地域の人を手伝うこと</div>
                <div class="option" data-value="alone">一人でゆっくり何かを作ること</div>
            </div>
        </div>

        <!-- 質問はもっと追加したい場合は教えてください。ここではサンプルとして2つだけ入れています。実際は5〜7個がおすすめ -->

        <button onclick="showResult()">診断結果を見る</button>

        <div class="result" id="result">
            <h2>あなたのつぎてイメージ</h2>
            <p id="result-text" style="font-size:1.2rem; line-height:1.8;"></p>
            <button onclick="location.reload()">もう一度診断する</button>
        </div>
    </div>

    <footer>
        <p>つぎて — 自分のペースで、自然とつながる仕事マッチング</p>
    </footer>

    <script>
        // 簡単な選択機能（クリックで選択状態に）
        document.querySelectorAll('.option').forEach(option => {
            option.addEventListener('click', () => {
                const parent = option.parentElement;
                parent.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
            });
        });

        function showResult() {
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('result-text');
            
            // 簡易的な結果例（実際はもっと詳細なロジックにできます）
            resultText.innerHTML = `
                あなたは<strong>自然の中でゆったりと手を動かす</strong>のが心地よいタイプのようです。<br><br>
                北海道の広々とした畑や、岐阜の工房のような場所で、<br>
                自分の感覚を大切にしながら次の仕事をつないでいくイメージがぴったりです。<br><br>
                🌾 ゆったり農家系 / 🪵 手仕事職人系 がおすすめ
            `;
            resultDiv.style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
